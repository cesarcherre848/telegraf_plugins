version: '3.8'

services:
  telegraf:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./docker/telegraf.conf:/etc/telegraf/telegraf.conf
      - ./plugins/processors/milesight_processor/milesight_processor.conf:/etc/telegraf/milesight_processor.conf
    ports:
      - "8094:8094"
    environment:
      - TELEGRAF_DEBUG=true
